<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte ao Cliente</title>
    <link rel="stylesheet" href="Suporte.css">
</head>

<body>

    <div class="container">
        <h1>Suporte ao cliente</h1>


        <div class="item">
            <div>
                <label for="name" class="label">Nome</label><br>
                <input type="text" name="name" id="name" class="inputNome"><br>
            </div>

            <div>
                <label for="email" class="label">Email</label><br>
                <input type="text" name="email" id="email" class="inputEmail"><br>
            </div>

            <div>
                <label for="cpf" class="label">CPF</label><br>
                <input type="number" name="cpf" id="cpf" class="inputCpf"><br>
            </div>

            <div>
                <label for="freclamacao" class="label"> Escreva a reclamação/sugestão no campo abaixo: </label><br>
                <input type="text" name="freclamacao" id="reclamacao" class="inputReclamacao">
                <button id="bntContinuar" class="btn">➤</button>
            </div>

        </div>

    </div>

    <footer class="rodape">
        <!-- <br> <button class="volta">Voltar</button> -->
    </footer>



</body>

</html>
